<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Prescription | MediFlow</title>

  <style>
    body {
      background: #f4f8fc;
      font-family: "Segoe UI", sans-serif;
    }

    .prescription-container {
      width: 650px;
      margin: 60px auto;
      background: white;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }

    h2 {
      text-align: center;
      color: #0d47a1;
      margin-bottom: 10px;
    }

    h3 {
      margin-top: 30px;
      color: #1976d2;
      border-bottom: 2px solid #e3f2fd;
      padding-bottom: 6px;
    }

    label {
      font-weight: 600;
      margin-top: 15px;
      display: block;
      color: #333;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      height: 110px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 15px;
    }

    .row div {
      flex: 1;
    }

    .back-btn {
      background: none;
      border: none;
      color: #1976d2;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .submit-btn {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #0d47a1;
    }

    #orderResult {
      margin-top: 18px;
      color: green;
      font-weight: bold;
      text-align: center;
      font-size: 15px;
    }
  </style>
</head>

<body>

  <div class="prescription-container">

    <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

    <h2>Medical Prescription</h2>

    <h3>Patient Information</h3>

    <label>Patient Name</label>
    <input id="patientName" placeholder="Enter patient name">

    <div class="row">
      <div>
        <label>Age</label>
        <input id="age" type="number" placeholder="Age">
      </div>

      <div>
        <label>Sex</label>
        <select id="sex">
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Weight (kg)</label>
        <input id="weight" type="number" placeholder="Weight">
      </div>

      <div>
        <label>Date</label>
        <input id="date" type="date">
      </div>
    </div>

    <label>Diagnosis</label>
    <textarea id="diagnosis" placeholder="Enter diagnosis / symptoms"></textarea>

    <h3>Medication & Instructions</h3>

    <textarea id="medication" placeholder="
Paracetamol 500mg – twice daily – 3 days
Amoxicillin 250mg – thrice daily – 5 days
ORS – after loose motions
    "></textarea>

    <button class="submit-btn" onclick="submitPrescription()">
      Submit Prescription
    </button>

    <p id="orderResult"></p>

  </div>

  <script>
    // 🔐 Login check
    const doctorId = localStorage.getItem("doctorId");
    if (!doctorId) {
      alert("Please login first");
      window.location.href = "doctor-login.html";
    }

    function submitPrescription() {
      const patientName = document.getElementById("patientName").value;
      const age = document.getElementById("age").value;
      const sex = document.getElementById("sex").value;
      const weight = document.getElementById("weight").value;
      const date = document.getElementById("date").value;
      const diagnosis = document.getElementById("diagnosis").value;
      const medication = document.getElementById("medication").value;

      if (!patientName || !age || !sex || !date || !medication) {
        alert("Please fill all required fields");
        return;
      }

      const details = `
Patient Name: ${patientName}
Age: ${age}
Sex: ${sex}
Weight: ${weight} kg
Date: ${date}

Diagnosis:
${diagnosis}

Medication:
${medication}
      `;

      fetch("http://localhost:3000/doctor/prescribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          doctor_id: doctorId,
          patient_name: patientName,
          details: details
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("orderResult").innerText =
          "✅ Order ID generated: " + data.orderId;
      });
    }

    function goBack() {
      window.location.href = "doctor-dashboard.html";
    }
  </script>

</body>
</html>
