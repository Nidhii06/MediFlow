<!DOCTYPE html>
<html>
<head>
  <title>Doctor Panel</title>
</head>
<body>

  <h2>Doctor Login</h2>

  <input id="doctorId" placeholder="Doctor ID"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="loginDoctor()">Login</button>

  <p id="loginResult"></p>

  <hr>

  <h2>Prescription Form</h2>

  <input id="patientName" placeholder="Patient Name"><br><br>

  <textarea id="details" placeholder="Prescription details"></textarea><br><br>

  <button onclick="submitPrescription()">Submit Prescription</button>

  <p id="orderResult"></p>

  <hr>

  <h2>My Prescription History</h2>

  <button onclick="loadHistory()">View My Prescriptions</button>

  <div id="history"></div>

  <script>
    let loggedDoctorId = "";

    function loginDoctor() {
      const doctorId = document.getElementById("doctorId").value;
      const password = document.getElementById("password").value;

      fetch("http://localhost:3000/auth/doctor", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          doctor_id: doctorId,
          password: password
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          loggedDoctorId = doctorId;
          document.getElementById("loginResult").innerText = "Login successful";
        } else {
          document.getElementById("loginResult").innerText = "Invalid credentials";
        }
      });
    }

    function submitPrescription() {
      const patientName = document.getElementById("patientName").value;
      const details = document.getElementById("details").value;

      fetch("http://localhost:3000/doctor/prescribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          doctor_id: loggedDoctorId,
          patient_name: patientName,
          details: details
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("orderResult").innerText =
          "Order ID generated: " + data.orderId;
      });
    }

    function loadHistory() {
      fetch("http://localhost:3000/doctor/history/" + loggedDoctorId)
        .then(res => res.json())
        .then(data => {
          let html = "";
          data.forEach(order => {
            html += `
              <p>
                <b>Order ID:</b> ${order.order_id}<br>
                <b>Patient:</b> ${order.patient_name}<br>
                <b>Status:</b> ${order.status}
              </p>
              <hr>
            `;
          });
          document.getElementById("history").innerHTML = html;
        });
    }
  </script>

</body>
</html>
